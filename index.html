<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lidiana & Jefferson | Convite de Casamento</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #FEFDF8 0%, #F9F7F0 50%, #FFF9F0 100%);
            color: #1C3A1C;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vh 3vw; 
            position: relative;
            overflow: hidden;
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .particle {
            position: absolute; width: 4px; height: 4px;
            background: radial-gradient(circle, #FFD700 0%, #D4AF37 50%, transparent 100%);
            border-radius: 50%; opacity: 0.5;
            animation: float 15s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-15px) translateX(-10px) scale(0.9); opacity: 0.3; }
        }

        .invitation-container {
            max-width: 900px;
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            border: 3px solid #D4AF37;
            box-shadow: 0 25px 70px rgba(45, 106, 79, 0.15), inset 0 2px 3px rgba(212, 175, 55, 0.08);
            border-radius: 20px;
            padding: 3vh 10px; 
            position: relative;
            z-index: 2;
            opacity: 0;
            animation: fadeInContainer 1.2s ease-out 0.3s forwards;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; 
            align-items: center;
            overflow: hidden;
        }

        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .invitation-container::before {
            content: ''; position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 12px; pointer-events: none;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes shimmer { 0% { background-position: -100% 0; } 100% { background-position: 200% 0; } }

        .ornament-top, .ornament-bottom {
            font-size: clamp(16px, min(4vw, 4vh), 30px);
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 40%, #C5A028 70%, #A8860C 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; margin: 0;
        }
        .ornament-top { animation: fadeInScale 1s ease-out 0.8s forwards; }
        .ornament-bottom { animation: fadeInScale 1s ease-out 2.8s forwards; }

        .header {
            text-align: center; opacity: 0;
            animation: fadeInUp 1.2s ease-out 1.2s forwards;
            width: 100%;
        }

        .couple-names {
            font-family: 'Great Vibes', cursive;
            white-space: nowrap; 
            font-size: clamp(28px, 11.5vw, 80px); 
            font-weight: 400;
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 25%, #2D6A4F 50%, #1B5E20 75%, #C5A028 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1.4; 
            padding: 10px 5px; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
            animation: shimmer 4s linear infinite;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(10px, 2.5vw, 16px);
            color: #1B5E20; text-transform: uppercase; letter-spacing: 3px; font-weight: 700;
            margin-top: -15px; 
        }

        .divider {
            display: flex; align-items: center; justify-content: center;
            width: 80%; gap: 10px; opacity: 0; animation: fadeInUp 1s ease-out 1.5s forwards;
        }
        .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.6) 50%, transparent 100%); }
        .divider-icon { font-size: clamp(12px, 2.5vh, 20px); background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #C5A028 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .bible-verse { text-align: center; opacity: 0; animation: fadeInUp 1.2s ease-out 1.8s forwards; padding: 0 5px;}
        .verse-text { font-size: clamp(12px, 3.2vw, 20px); font-style: italic; color: #2D6A4F; line-height: 1.2; font-weight: 400; }
        .verse-reference { font-size: clamp(9px, 2.2vw, 14px); color: #D4AF37; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;}

        .event-details {
            text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 0.5vh;
        }
        .detail-section { opacity: 0; animation: fadeInUp 1s ease-out 2s forwards; }
        .detail-icon { font-size: clamp(16px, 3.5vh, 28px); margin-bottom: 2px; background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #C5A028 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .detail-label { font-size: clamp(9px, 2.2vw, 13px); color: #1B5E20; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 2px; }
        .detail-value { font-size: clamp(14px, 3.5vw, 22px); color: #1C3A1C; font-weight: 700; line-height: 1.1; }
        .location-name { font-size: clamp(12px, 3vw, 18px); color: #2D6A4F; font-weight: 500; }

        .action-buttons {
            display: flex; flex-direction: row; justify-content: center; gap: 4vw; width: 100%;
        }
        .btn-wrapper {
            display: flex; flex-direction: column; align-items: center; text-decoration: none; gap: 5px; opacity: 0; animation: fadeInScale 0.8s ease-out 2.2s forwards;
        }
        .btn {
            width: clamp(40px, 11vw, 65px); height: clamp(40px, 11vw, 65px);
            border-radius: 50%; background-color: #FFFFFF; border: 2px solid #D4AF37; color: #D4AF37;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(16px, 4.5vw, 24px); transition: all 0.4s ease; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.15);
        }
        .btn-text {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(9px, 2.5vw, 14px);
            font-weight: 700; color: #B8860B; text-transform: uppercase; letter-spacing: 0.5px;
            text-align: center; line-height: 1.1;
        }

        .btn-wrapper:hover .btn { background: linear-gradient(135deg, #D4AF37 0%, #C5A028 100%); color: #FFFFFF; border-color: #C5A028; transform: translateY(-3px); }
        .btn-wrapper:hover .btn-text { color: #C5A028; }

        @media (max-height: 550px) {
            .bible-verse { display: none; } 
            .divider { margin: 1px 0; gap: 5px; }
            .invitation-container { justify-content: space-around; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="invitation-container">
        
        <div class="ornament-top">❖ ✦ ❖</div>

        <div class="header">
            <h1 class="couple-names">Lidiana & Jefferson</h1>
            <h2 class="subtitle">Convite de Casamento</h2>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon"><i class="fas fa-ring"></i></div>
            <div class="divider-line"></div>
        </div>

        <div class="bible-verse">
            <p class="verse-text">"Portanto, o que Deus ajuntou não separe o homem."</p>
            <p class="verse-reference">Mateus 19:6</p>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon"><i class="fas fa-heart"></i></div>
            <div class="divider-line"></div>
        </div>

        <div class="event-details">
            <div class="detail-section">
                <div class="detail-icon"><i class="far fa-calendar-alt"></i></div>
                <div class="detail-label">Data</div>
                <div class="detail-value">21 de Março de 2026</div>
            </div>

            <div class="detail-section">
                <div class="detail-icon"><i class="far fa-clock"></i></div>
                <div class="detail-label">Horário</div>
                <div class="detail-value">12:30 hs</div>
            </div>

            <div class="detail-section">
                <div class="detail-icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="detail-label">Local</div>
                <div class="detail-value">Restaurante Casa Do Mar</div>
                <div class="location-name">Praia Virgem – Rio das Ostras</div>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon"><i class="fas fa-gem"></i></div>
            <div class="divider-line"></div>
        </div>

        <div class="action-buttons">
            <a href="https://wa.me/5522974028677?text=Ol%C3%A1!%20Confirmo%20minha%20presen%C3%A7a%20no%20casamento%20de%20Lidiana%20%26%20Jefferson%20no%20dia%2021%20de%20mar%C3%A7o%20de%202026.%20%F0%9F%A5%82%F0%9F%92%8D" target="_blank" class="btn-wrapper">
                <div class="btn"><i class="fab fa-whatsapp"></i></div>
                <span class="btn-text">Confirmar</span>
            </a>

            <a href="https://maps.google.com/maps?q=-22.53074073791504%2C-41.92820358276367&z=17&hl=pt-BR" target="_blank" class="btn-wrapper">
                <div class="btn"><i class="fas fa-map-marked-alt"></i></div>
                <span class="btn-text">Local</span>
            </a>

            <a href="https://www.instagram.com/casadomar_ro/" target="_blank" class="btn-wrapper">
                <div class="btn"><i class="fab fa-instagram"></i></div>
                <span class="btn-text">Ver Fotos</span>
            </a>
        </div>

        <div class="ornament-bottom">❖ ✦ ❖</div>
    </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30; 
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
